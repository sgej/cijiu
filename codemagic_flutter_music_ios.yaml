workflows:
  ios_flutter_music_player:
    name: Flutter Music Player iOS (No Signing)
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Analyze project
        script: flutter analyze || true

      - name: Run tests
        script: flutter test || true

      - name: Build iOS (no code signing IPA)
        script: flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - build/ios/iphoneos/*.app
